version: '3.8'

services:
  # ============================================
  # WPPConnect-Server — Conexão WhatsApp via QR Code
  # ============================================
  wppconnect:
    image: wppconnect/server-cli:latest
    container_name: wppconnect-server
    restart: unless-stopped
    command:
      - --secretKey
      - prospeccao-secret-2024
      - --port
      - "21465"
      - --startAllSession
      - --webhook-url
      - http://host.docker.internal:3000/api/webhook/whatsapp
      - --webhook-autoDownload
      - --webhook-readMessage
      - --no-webhook-onPresenceChanged
      - --no-webhook-onParticipantsChanged
      - --no-webhook-listenAcks
    ports:
      - "21465:21465"
    volumes:
      - wppconnect_tokens:/usr/src/wpp-server/tokens
      - wppconnect_data:/usr/src/wpp-server/userDataDir
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - prospeccao-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:21465/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # n8n — Automação de fluxos
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_DEFAULT_LOCALE=pt-BR
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - prospeccao-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Redis — Fila de disparos (Bull)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - prospeccao-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  wppconnect_data:
    driver: local
  wppconnect_tokens:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local

networks:
  prospeccao-net:
    driver: bridge
